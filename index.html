<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Impianti</title>
    <script type="module">
        // Import Firebase 
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        // Configura il tuo progetto Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAlu5Q1Ww3u2Dt_INeKOm5GSeEU-qFDtJs",
            authDomain: "addolcitori-2f8fe.firebaseapp.com",
            databaseURL: "https://addolcitori-2f8fe-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "addolcitori-2f8fe",
            storageBucket: "addolcitori-2f8fe.firebasestorage.app",
            messagingSenderId: "399702428879",
            appId: "1:399702428879:web:4bee57dcdc3b80eea8bbba"
        };

        // Inizializza Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.addEventListener('DOMContentLoaded', () => {
            const dataForm = document.getElementById('dataForm');
            const modelList = document.getElementById('modelList');
            const impiantoSelect = document.getElementById('impiantoSelect');
            const dimensioneInput = document.getElementById('dimensione');
            const coloreUgelloInput = document.getElementById('coloreUgello');
            const dimensioneColloInput = document.getElementById('dimensioneCollo');
            const quantitaResinaInput = document.getElementById('quantitaResina');
            const quantitaSottolettoInput = document.getElementById('quantitaSottoletto');
            const spazioLiberoInput = document.getElementById('spazioLibero');
            const quantitaSabbiaInput = document.getElementById('quantitaSabbia');

            // Nascondi i campi inizialmente
            hideFields();

            // Listener per il menu a tendina
            impiantoSelect.addEventListener('change', () => {
                const selectedImpianto = impiantoSelect.value;
                showFields(selectedImpianto);
            });

            // Aggiungi dati
            dataForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const modello = impiantoSelect.value;
                const dimensione = dimensioneInput.value;
                const coloreUgello = coloreUgelloInput.value;
                const dimensioneCollo = dimensioneColloInput.value;
                const quantitaResina = quantitaResinaInput.value;
                const quantitaSottoletto = quantitaSottolettoInput.value;
                const spazioLibero = spazioLiberoInput.value;
                const quantitaSabbia = quantitaSabbiaInput.value;

                try {
                    await addDoc(collection(db, 'modelli'), {
                        modello: modello,
                        dimensione: dimensione,
                        coloreUgello: coloreUgello,
                        dimensioneCollo: dimensioneCollo,
                        quantitaResina: quantitaResina,
                        quantitaSottoletto: quantitaSottoletto,
                        spazioLibero: spazioLibero,
                        quantitaSabbia: quantitaSabbia
                    });
                    document.getElementById('message').innerText = 'Dati inseriti con successo!';
                    dataForm.reset();
                    hideFields();
                    loadModels(); // Ricarica la lista dopo l'inserimento
                } catch (error) {
                    console.error("Errore durante l'inserimento dei dati: ", error);
                    document.getElementById('message').innerText = 'Errore durante l\'inserimento dei dati.';
                }
            });

            // Carica tutti i modelli
            loadModels();

            // Funzione per caricare i modelli
            async function loadModels() {
                modelList.innerHTML = ''; // Pulisci la lista
                const querySnapshot = await getDocs(collection(db, 'modelli'));
                
                querySnapshot.forEach((doc) => {
                    const model = doc.data();
                    const listItem = document.createElement('li');
                    listItem.textContent = `${model.modello} - ${model.dimensione}`;
                    
                    // Pulsante di modifica
                    const editButton = document.createElement('button');
                    editButton.textContent = 'Modifica';
                    editButton.onclick = () => editModel(doc.id, model);
                    listItem.appendChild(editButton);

                    // Pulsante di eliminazione
                    const deleteButton = document.createElement('button');
                    deleteButton.textContent = 'Elimina';
                    deleteButton.onclick = () => deleteModel(doc.id);
                    listItem.appendChild(deleteButton);

                    modelList.appendChild(listItem);
                });
            }

            // Funzione per mostrare i campi in base all'impianto selezionato
            function showFields(selectedImpianto) {
                hideFields(); // Nascondi prima tutti i campi
                dimensioneInput.style.display = 'block';
                quantitaResinaInput.style.display = 'block';
                spazioLiberoInput.style.display = 'block';
                
                if (selectedImpianto === 'he 1' || selectedImpianto === 'he 1,5"') {
                    coloreUgelloInput.style.display = 'block';
                    dimensioneColloInput.style.display = 'block';
                    quantitaSottolettoInput.style.display = 'block';
                } else if (selectedImpianto === 'ctm old' || selectedImpianto === 'ctm 2.0') {
                    quantitaSabbiaInput.style.display = 'block';
                }
            }

            // Funzione per nascondere i campi
            function hideFields() {
                dimensioneInput.style.display = 'none';
                coloreUgelloInput.style.display = 'none';
                dimensioneColloInput.style.display = 'none';
                quantitaResinaInput.style.display = 'none';
                quantitaSottolettoInput.style.display = 'none';
                spazioLiberoInput.style.display = 'none';
                quantitaSabbiaInput.style.display = 'none';
            }

            // Funzione per modificare un modello
            async function editModel(id, model) {
                const newDimension = prompt("Nuova dimensione:", model.dimensione);
                if (newDimension) {
                    const modelRef = doc(db, 'modelli', id);
                    await updateDoc(modelRef, {
                        dimensione: newDimension
                    });
                    loadModels(); // Ricarica la lista dopo la modifica
                }
            }

            // Funzione per eliminare un modello
            async function deleteModel(id) {
                const confirmation = confirm("Sei sicuro di voler eliminare questo modello?");
                if (confirmation) {
                    await deleteDoc(doc(db, 'modelli', id));
                    loadModels(); // Ricarica la lista dopo l'eliminazione
                }
            }
        });
    </script>
</head>
<body>
    <h1>Gestione Impianti</h1>
    <form id="dataForm">
        <label for="impiantoSelect">Seleziona Impianto:</label>
        <select id="impiantoSelect">
            <option value="">Seleziona Impianto</option>
            <option value="he 1">HE 1</option>
            <option value="he 1,5">HE 1,5"</option>
            <option value="ctm old">CTM Old</option>
            <option value="ctm 2.0">CTM 2.0</option>
            <option value="Ultra Line">Ultra Line</option>
            <option value="HiFlow">HiFlow</option>
        </select>

        <div>
            <label for="dimensione">Dimensione:</label>
            <input type="text" id="dimensione" required style="display:none;">
        </div>
        <div>
            <label for="coloreUgello">Colore Ugello:</label>
            <input type="text" id="coloreUgello" style="display:none;">
        </div>
        <div>
            <label for="dimensioneCollo">Dimensione Collo:</label>
            <input type="text" id="dimensioneCollo" style="display:none;">
        </div>
        <div>
            <label for="quantitaResina">Quantità Resina:</label>
            <input type="text" id="quantitaResina" required style="display:none;">
        </div>
        <div>
            <label for="quantitaSottoletto">Quantità Sottoletto:</label>
            <input type="text" id="quantitaSottoletto" style="display:none;">
        </div>
        <div>
            <label for="spazioLibero">Spazio Libero:</label>
            <input type="text" id="spazioLibero" required style="display:none;">
        </div>
        <div>
            <label for="quantitaSabbia">Quantità Sabbia:</label>
            <input type="text" id="quantitaSabbia" style="display:none;">
        </div>
        <button type="submit">Inserisci</button>
    </form>
    <p id="message"></p>

    <h2>Lista Impianti</h2>
    <ul id="modelList"></ul>
</body>
</html>

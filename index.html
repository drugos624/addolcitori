<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Impianti</title>
    <style>
        .hidden {
            visibility: hidden;
            height: 0;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <h1>Inserisci Dati Impianto</h1>
    <form id="impiantoForm">
        <label for="impianto">Seleziona Impianto:</label>
        <select id="impianto" onchange="showFieldsForSelectedImpianto()">
            <option value="">--Seleziona--</option>
            <option value="he 1">HE 1</option>
            <option value="he 1,5">HE 1,5"</option>
            <option value="ctm old">CTM Old</option>
            <option value="ctm 2.0">CTM 2.0</option>
            <option value="Ultra Line">Ultra Line</option>
            <option value="HiFlow">HiFlow</option>
        </select>

        <div id="heFields" class="hidden">
            <label for="dimensione">Dimensione:</label>
            <input type="text" id="dimensione" required>

            <label for="coloreUgello">Colore Ugello:</label>
            <input type="text" id="coloreUgello" required>

            <label for="dimensioneCollo">Dimensione Collo:</label>
            <input type="text" id="dimensioneCollo" required>

            <label for="quantitaResina">Quantità Resine:</label>
            <input type="number" id="quantitaResina" required>

            <label for="quantitaSottoletto">Quantità Sottoletto:</label>
            <input type="number" id="quantitaSottoletto" required>

            <label for="spazioLibero">Spazio Libero:</label>
            <input type="number" id="spazioLibero" required>
        </div>

        <div id="ctmFields" class="hidden">
            <label for="dimensioneCTM">Dimensione:</label>
            <input type="text" id="dimensioneCTM" required>

            <label for="coloreUgelloCTM">Colore Ugelli:</label>
            <input type="text" id="coloreUgelloCTM" required>

            <label for="quantitaResinaCTM">Quantità Resina:</label>
            <input type="number" id="quantitaResinaCTM" required>

            <label for="quantitaSabbia">Quantità Sabbia:</label>
            <input type="number" id="quantitaSabbia" required>

            <label for="spazioLiberoCTM">Spazio Libero:</label>
            <input type="number" id="spazioLiberoCTM" required>
        </div>

        <button type="submit">Invia</button>
    </form>

    <script>
        function showFieldsForSelectedImpianto() {
            const impianto = document.getElementById('impianto').value;
            const heFields = document.getElementById('heFields');
            const ctmFields = document.getElementById('ctmFields');

            // Nascondi tutti i campi inizialmente
            heFields.classList.add('hidden');
            ctmFields.classList.add('hidden');

            // Mostra i campi in base al modello selezionato
            if (impianto === "he 1" || impianto === "he 1,5") {
                heFields.classList.remove('hidden');
            } else if (impianto === "ctm old" || impianto === "ctm 2.0") {
                ctmFields.classList.remove('hidden');
            }
        }

        document.getElementById('impiantoForm').addEventListener('submit', function(event) {
            event.preventDefault();
            // Aggiungi qui la logica per inviare i dati al database Firestore
            alert('Dati inviati correttamente!');
        });
    </script>
</body>
</html>

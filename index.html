<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seleziona Modello e Dimensione</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            font-size: 1.2em;
            margin: 0;
            color: #333;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 2.5em;
            color: #0056b3;
        }

        label {
            margin: 10px 0;
        }

        select, input {
            padding: 10px;
            margin: 10px 0;
            width: 250px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1em;
        }

        button {
            padding: 10px 15px;
            margin-top: 20px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
        }

        button:hover {
            background-color: #218838;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <h1>Seleziona Modello e Dimensione</h1>
    
    <label for="modello">Modello:</label>
    <select id="modello" onchange="showDimensions()">
        <option value="">-- Seleziona --</option>
        <option value="ctm old">CTM Old</option>
        <option value="ctm 2.0">CTM 2.0</option>
        <option value="he 1">HE 1</option>
        <option value="he 1.5">HE 1.5</option>
    </select>

    <label for="dimensione" class="hidden">Dimensione:</label>
    <select id="dimensione" class="hidden" onchange="showFields()">
        <option value="">-- Seleziona --</option>
    </select>

    <form id="modelloForm" class="hidden">
        <label for="capacitaScambio">Capacità Scambio:</label>
        <input type="number" id="capacitaScambio" required><br>

        <label for="minutiAcquaSale">Minuti Acqua al Sale:</label>
        <input type="number" id="minutiAcquaSale" required><br>

        <label for="quantitaSale">Quantità Sale:</label>
        <input type="number" id="quantitaSale" required><br>

        <label for="quantitaResina">Quantità Resina:</label>
        <input type="number" id="quantitaResina" required><br>

        <label for="quantitaSabbia">Quantità Sabbia:</label>
        <input type="number" id="quantitaSabbia" required><br>

        <label for="spazioLibero">Spazio Libero:</label>
        <input type="number" id="spazioLibero" required><br>

        <label for="dimensioneCollo">Dimensione Collo:</label>
        <input type="text" id="dimensioneCollo" required><br>

        <div id="coloreUgelloContainer" class="hidden">
            <label for="coloreUgello">Colore Ugello:</label>
            <select id="coloreUgello" required>
                <option value="">-- Seleziona --</option>
                <option value="Nero">Nero</option>
                <option value="Viola">Viola</option>
                <option value="Rosso">Rosso</option>
                <option value="Bianco">Bianco</option>
                <option value="Blu">Blu</option>
                <option value="Beige">Beige</option>
            </select><br>
        </div>

        <div id="coloreInsertiContainer" class="hidden">
            <label for="coloreInserti">Colore Inserti GPM:</label>
            <select id="coloreInserti" required>
                <option value="">-- Seleziona --</option>
                <option value="nero-nero-nero">Nero - Nero - Nero</option>
                <option value="tappo-tappo-blu">Tappo - Tappo - Blu</option>
                <option value="tappo-tappo-rosse">Tappo - Tappo - Rosse</option>
                <option value="tappo-tappo-verde">Tappo - Tappo - Verde</option>
                <option value="tappo-blu-blu">Tappo - Blu - Blu</option>
                <option value="tappo-rosso-rosso">Tappo - Rosso - Rosso</option>
                <option value="blu-blu-arancio">Blu - Blu - Arancio</option>
                <option value="arancio-arancio-arancio">Arancio - Arancio - Arancio</option>
            </select><br>
        </div>

        <button type="button" onclick="inviaDati()">Invia</button>
    </form>

    <!-- Inclusione di Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>

    <script>
        // Configurazione di Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAlu5Q1Ww3u2Dt_INeKOm5GSeEU-qFDtJs",
            authDomain: "addolcitori-2f8fe.firebaseapp.com",
            databaseURL: "https://addolcitori-2f8fe-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "addolcitori-2f8fe",
            storageBucket: "addolcitori-2f8fe.firebasestorage.app",
            messagingSenderId: "399702428879",
            appId: "1:399702428879:web:b9724499e30c49a3a8bbba"
        };

        // Inizializza Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function showDimensions() {
            const modello = document.getElementById('modello').value;
            const dimensioneSelect = document.getElementById('dimensione');
            const dimensioneLabel = document.querySelector('label[for="dimensione"]');

            // Ripulisci le dimensioni precedenti
            dimensioneSelect.innerHTML = '<option value="">-- Seleziona --</option>';

            if (modello === "ctm old") {
                const dimensioni = [60, 90, 120];
                dimensioni.forEach(dim => {
                    const option = document.createElement('option');
                    option.value = dim;
                    option.textContent = dim;
                    dimensioneSelect.appendChild(option);
                });
                dimensioneLabel.classList.remove('hidden');
                dimensioneSelect.classList.remove('hidden');
            } else if (modello === "ctm 2.0") {
                const dimensioni = [80, 100, 140];
                dimensioni.forEach(dim => {
                    const option = document.createElement('option');
                    option.value = dim;
                    option.textContent = dim;
                    dimensioneSelect.appendChild(option);
                });
                dimensioneLabel.classList.remove('hidden');
                dimensioneSelect.classList.remove('hidden');
            } else {
                dimensioneLabel.classList.add('hidden');
                dimensioneSelect.classList.add('hidden');
            }
        }

        function showFields() {
            const modello = document.getElementById('modello').value;
            const dimensione = document.getElementById('dimensione').value;
            const form = document.getElementById('modelloForm');
            const coloreUgelloContainer = document.getElementById('coloreUgelloContainer');
            const coloreInsertiContainer = document.getElementById('coloreInsertiContainer');

            // Mostra il form e i campi aggiuntivi in base al modello selezionato
            form.classList.remove('hidden');
            coloreUgelloContainer.classList.remove('hidden');
            if (modello === "ctm old" || modello === "ctm 2.0") {
                coloreInsertiContainer.classList.remove('hidden');
            } else {
                coloreInsertiContainer.classList.add('hidden');
            }
        }

               function inviaDati() {
            const modello = document.getElementById('modello').value;
            const dimensione = document.getElementById('dimensione').value;
            const capacitaScambio = document.getElementById('capacitaScambio').value;
            const minutiAcquaSale = document.getElementById('minutiAcquaSale').value;
            const quantitaSale = document.getElementById('quantitaSale').value;
            const quantitaResina = document.getElementById('quantitaResina').value;
            const quantitaSabbia = document.getElementById('quantitaSabbia').value;
            const spazioLibero = document.getElementById('spazioLibero').value;
            const dimensioneCollo = document.getElementById('dimensioneCollo').value;
            const coloreUgello = document.getElementById('coloreUgello').value;
            const coloreInserti = document.getElementById('coloreInserti') ? document.getElementById('coloreInserti').value : null;

            // Creazione dell'oggetto da salvare
            const dati = {
                modello: modello,
                dimensione: dimensione,
                capacitaScambio: capacitaScambio,
                minutiAcquaSale: minutiAcquaSale,
                quantitaSale: quantitaSale,
                quantitaResina: quantitaResina,
                quantitaSabbia: quantitaSabbia,
                spazioLibero: spazioLibero,
                dimensioneCollo: dimensioneCollo,
                coloreUgello: coloreUgello,
                coloreInserti: coloreInserti
            };

            // Salvataggio dei dati in Firestore
            db.collection("addolcitori").add(dati)
                .then(() => {
                    alert("Dati inviati con successo!");
                    // Reset del modulo
                    document.getElementById("modelloForm").reset();
                    document.getElementById("dimensione").classList.add('hidden');
                    document.getElementById("modello").value = "";
                    showDimensions();
                })
                .catch((error) => {
                    console.error("Errore durante l'invio dei dati: ", error);
                    alert("Errore durante l'invio dei dati.");
                });
        }
    </script>
</body>
</html>

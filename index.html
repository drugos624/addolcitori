<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inserisci Dati</title>
    <script type="module">
        // Import Firebase 
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, collection, setDoc, doc } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        // Configura il tuo progetto Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAlu5Q1Ww3u2Dt_INeKOm5GSeEU-qFDtJs",
            authDomain: "addolcitori-2f8fe.firebaseapp.com",
            projectId: "addolcitori-2f8fe",
            storageBucket: "addolcitori-2f8fe.firebasestorage.app",
            messagingSenderId: "399702428879",
            appId: "1:399702428879:web:4bee57dcdc3b80eea8bbba"
        };

        // Inizializza Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.addEventListener('DOMContentLoaded', () => {
            const modelloSelect = document.getElementById('modello');
            const dimensioneInput = document.getElementById('dimensione');
            const coloreUgelloInput = document.getElementById('coloreUgello');
            const coloreColloInput = document.getElementById('coloreCollo');
            const coloreColloLabel = document.getElementById('coloreColloLabel'); // Aggiunto per nascondere l'etichetta

            // Nascondi i campi di input inizialmente
            dimensioneInput.style.display = 'none';
            coloreUgelloInput.style.display = 'none';
            coloreColloInput.style.display = 'none';
            coloreColloLabel.style.display = 'none'; // Nascondi l'etichetta del colore collo

            modelloSelect.addEventListener('change', () => {
                const selectedModello = modelloSelect.value;
                // Nascondi tutti i campi
                dimensioneInput.style.display = 'none';
                coloreUgelloInput.style.display = 'none';
                coloreColloInput.style.display = 'none';
                coloreColloLabel.style.display = 'none'; // Nascondi l'etichetta del colore collo

                // Mostra i campi in base al modello selezionato
                if (selectedModello === 'he' || selectedModello === 'he1') {
                    dimensioneInput.style.display = 'block';
                    coloreUgelloInput.style.display = 'block';
                    coloreColloInput.style.display = 'block';
                    coloreColloLabel.style.display = 'block'; // Mostra l'etichetta del colore collo
                    coloreColloInput.required = true; // Rendi richiesto
                } else if (selectedModello === 'ctm' || selectedModello === 'ctm2') {
                    dimensioneInput.style.display = 'block';
                    coloreUgelloInput.style.display = 'block';
                    coloreColloInput.style.display = 'none'; // Nascondi il campo colore collo
                    coloreColloLabel.style.display = 'none'; // Nascondi l'etichetta del colore collo
                    coloreColloInput.required = false; // Rendi facoltativo
                }
            });

            document.getElementById('dataForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const modello = modelloSelect.value; // Ottieni il modello selezionato
                const dimensione = document.getElementById('dimensione').value;
                const coloreUgello = document.getElementById('coloreUgello').value;
                const coloreCollo = document.getElementById('coloreCollo').value;

                // Controlla se il campo di modello è selezionato
                if (!modello) {
                    document.getElementById('message').innerText = 'Seleziona un modello!';
                    return;
                }

                // Controlla la visibilità e la validità dei campi
                if ((modello === 'he' || modello === 'he1') && (!dimensione || !coloreUgello || !coloreCollo)) {
                    document.getElementById('message').innerText = 'Compila tutti i campi richiesti!';
                    return;
                } else if ((modello === 'ctm' || modello === 'ctm2') && (!dimensione || !coloreUgello)) {
                    document.getElementById('message').innerText = 'Compila tutti i campi richiesti!';
                    return;
                }

                // Crea un oggetto dati da inserire
                const dati = {
                    dimensione: dimensione,
                    coloreUgello: coloreUgello,
                    coloreCollo: (modello === 'he' || modello === 'he1') ? coloreCollo : null // Aggiungi solo se esiste
                };

                try {
                    // Usa il nome del modello come ID del documento
                    await setDoc(doc(db, 'modelli', modello), dati);
                    document.getElementById('message').innerText = 'Dati inseriti con successo!';
                    document.getElementById('dataForm').reset();
                } catch (error) {
                    console.error("Errore durante l'inserimento dei dati: ", error);
                    document.getElementById('message').innerText = 'Errore durante l\'inserimento dei dati.';
                }
            });
        });
    </script>
</head>
<body>
    <h1>Inserisci Dati</h1>
    <form id="dataForm">
        <label for="modello">Modello:</label>
        <select id="modello" required>
            <option value="">Seleziona un modello</option>
            <option value="he">HE</option>
            <option value="he1">HE 1"</option>
            <option value="ctm">CTM</option>
            <option value="ctm2">CTM 2.0</option>
        </select>
        
        <div>
            <label for="dimensione">Dimensione:</label>
            <input type="text" id="dimensione" required style="display:none;">
        </div>
        
        <div>
            <label for="coloreUgello">Colore Ugello:</label>
            <input type="text" id="coloreUgello" required style="display:none;">
        </div>
        
        <div>
            <label id="coloreColloLabel" for="coloreCollo" style="display:none;">Colore Collo:</label>
            <input type="text" id="coloreCollo" required style="display:none;">
        </div>

        <button type="submit">Inserisci</button>
    </form>
    <p id="message"></p>
</body>
</html>

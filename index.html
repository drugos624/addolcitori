<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inserimento Dati Addolcitori</title>
    <script type="module" src="firebaseInit.js"></script>
    <script type="module" src="app.js"></script>
</head>
<body>
    <h1>Inserisci Dati Addolcitori</h1>
    <form id="dataForm">
        <label for="modello">Modello:</label>
        <input type="text" id="modello" required>
        <br>
        <label for="dimensione">Dimensione:</label>
        <input type="text" id="dimensione" required>
        <br>
        <button type="submit">Inserisci Dati</button>
    </form>
    <div id="message"></div>
</body>
</html>

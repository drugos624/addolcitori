<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seleziona Modello</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js"></script>
    <style>
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <h1>Seleziona Modello</h1>
    <label for="modello">Modello:</label>
    <select id="modello" onchange="showFields()">
        <option value="">-- Seleziona --</option>
        <option value="he 1">HE 1</option>
        <option value="he 1.5">HE 1.5</option>
    </select>

    <form id="modelloForm" class="hidden">
        <label for="dimensione">Dimensione:</label>
        <input type="text" id="dimensione" required><br>

        <label for="quantitaResina">Quantità Resina:</label>
        <input type="number" id="quantitaResina" required><br>

        <label for="quantitaSabbia">Quantità Sabbia:</label>
        <input type="number" id="quantitaSabbia" required><br>

        <label for="coloreUgello">Colore Ugello:</label>
        <input type="text" id="coloreUgello" required><br>

        <label for="numeroCollo">Numero Collo:</label>
        <input type="text" id="numeroCollo" required><br>

        <button type="button" onclick="inviaDati()">Invia</button>
    </form>

    <script>
        // Configurazione di Firebase
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        // Inizializza Firebase
        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function showFields() {
            const modello = document.getElementById('modello').value;
            const form = document.getElementById('modelloForm');

            if (modello) {
                form.classList.remove('hidden');
            } else {
                form.classList.add('hidden');
            }
        }

        function inviaDati() {
            const modello = document.getElementById('modello').value;
            const dimensione = document.getElementById('dimensione').value;
            const quantitaResina = document.getElementById('quantitaResina').value;
            const quantitaSabbia = document.getElementById('quantitaSabbia').value;
            const coloreUgello = document.getElementById('coloreUgello').value;
            const numeroCollo = document.getElementById('numeroCollo').value;

            if (modello && dimensione && quantitaResina && quantitaSabbia && coloreUgello && numeroCollo) {
                db.collection("modelli").doc(modello).set({
                    dimensione: dimensione,
                    quantitaResina: quantitaResina,
                    quantitaSabbia: quantitaSabbia,
                    coloreUgello: coloreUgello,
                    numeroCollo: numeroCollo
                })
                .then(() => {
                    alert("Dati inviati con successo!");
                })
                .catch((error) => {
                    console.error("Errore durante l'invio dei dati: ", error);
                });
            } else {
                alert("Compila tutti i campi richiesti.");
            }
        }
    </script>
</body>
</html>

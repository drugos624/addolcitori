<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Modelli Addolcitori</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }
        select, input {
            width: 100%;
            padding: 0.5rem;
            margin-bottom: 1rem;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 1rem;
        }
        button:hover {
            background-color: #45a049;
        }
        .error {
            color: red;
            font-size: 0.875rem;
            margin-top: -0.5rem;
            margin-bottom: 1rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 2rem;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        .delete-btn {
            background-color: #ff4444;
        }
        .delete-btn:hover {
            background-color: #cc0000;
        }
        .readonly-field {
            background-color: #f5f5f5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <h1>Gestione Modelli Addolcitori</h1>
    
    <div class="form-group">
        <label for="modello">Modello:</label>
        <select id="modello" onchange="showFields()">
            <option value="">-- Seleziona --</option>
            <option value="ctm old">CTM Old</option>
            <option value="ctm 2.0">CTM 2.0</option>
            <option value="he 1">HE 1"</option>
            <option value="he 1.5">HE 1.5"</option>
        </select>
    </div>

    <form id="modelloForm">
        <div class="form-group">
            <label for="dimensione">Dimensione:</label>
            <select id="dimensione" onchange="caricaValoriDefault()">
                <option value="">-- Seleziona --</option>
                <option value="60">60</option>
                <option value="90">90</option>
                <option value="120">120</option>
                <option value="150">150</option>
                <option value="210">210</option>
                <option value="300">300</option>
                <option value="450">450</option>
                <option value="600">600</option>
            </select>
            <div id="dimensione-error" class="error"></div>
        </div>

        <div class="form-group">
            <label for="quantitaResina">Quantità Resina (Cullex) (L):</label>
            <input type="number" id="quantitaResina" step="0.1" required readonly class="readonly-field">
            <div id="resina-error" class="error"></div>
        </div>

        <div class="form-group">
            <label for="quantitaSabbia">Quantità Sotto-letto (Cullsan) (Kg):</label>
            <input type="number" id="quantitaSabbia" step="0.1" required readonly class="readonly-field">
            <div id="sabbia-error" class="error"></div>
        </div>

        <div class="form-group">
            <label for="spazioLibero">Spazio Libero (mm):</label>
            <input type="number" id="spazioLibero" step="0.1" required readonly class="readonly-field">
            <div id="spazio-error" class="error"></div>
        </div>

        <div class="form-group">
            <label for="inserti">Inserti (gpm):</label>
            <input type="text" id="inserti" required readonly class="readonly-field">
            <div id="inserti-error" class="error"></div>
        </div>

        <button type="button" onclick="inviaDati()">Salva Dati</button>
    </form>

    <div id="tabellaContainer">
        <h2>Configurazioni Esistenti</h2>
        <table id="tabellaConfigurazioni">
            <thead>
                <tr>
                    <th>Dimensione</th>
                    <th>Resina (L)</th>
                    <th>Sotto-letto (Kg)</th>
                    <th>Spazio Libero (mm)</th>
                    <th>Inserti (gpm)</th>
                    <th>Azioni</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- Script Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    
    <script>
        // Configurazione Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAlu5Q1Ww3u2Dt_INeKOm5GSeEU-qFDtJs",
            authDomain: "addolcitori-2f8fe.firebaseapp.com",
            projectId: "addolcitori-2f8fe",
            storageBucket: "addolcitori-2f8fe.appspot.com",
            messagingSenderId: "399702428879",
            appId: "1:399702428879:web:b9724499e30c49a3a8bbba"
        };

        // Inizializza Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Dati default
        const datiDefault = {
            "60": {
                cullex: 56,
                cullsan: 14,
                spazioLibero: 482.6,
                inserti: "0.4 Nero,0.4 Nero,2.5 Nero"
            },
            "90": {
                cullex: 85,
                cullsan: 18,
                spazioLibero: 723.9,
                inserti: "Plug,Plug,Blu"
            },
            "120": {
                cullex: 113,
                cullsan: 23,
                spazioLibero: 762,
                inserti: "Plug,Plug,Rosso"
            },
            "150": {
                cullex: 142,
                cullsan: 32,
                spazioLibero: 762,
                inserti: "Plug,Plug,Verde"
            },
            "210": {
                cullex: 198,
                cullsan: 32,
                spazioLibero: 711.2,
                inserti: "Plug,Blu,Blu"
            },
            "300": {
                cullex: 283,
                cullsan: 59,
                spazioLibero: 863.6,
                inserti: "Plug,Rosso,Rosso"
            },
            "450": {
                cullex: 425,
                cullsan: 136,
                spazioLibero: 863.6,
                inserti: "Blu,Blu,Arancione"
            },
            "600": {
                cullex: 566,
                cullsan: 181,
                spazioLibero: 782.3,
                inserti: "Arancione,Arancione,Arancione"
            }
        };

        // Funzione per mostrare i campi
        function showFields() {
            console.log("showFields chiamata");
            const modello = document.getElementById('modello').value;
            if (modello) {
                document.getElementById('modelloForm').style.display = 'block';
                caricaConfigurazioni(modello);
            } else {
                document.getElementById('modelloForm').style.display = 'none';
            }
        }

        // Funzione per caricare i valori default
        function caricaValoriDefault() {
            console.log("caricaValoriDefault chiamata");
            const dimensione = document.getElementById('dimensione').value;
            const dati = datiDefault[dimensione];
            
            if (dati) {
                document.getElementById('quantitaResina').value = dati.cullex;
                document.getElementById('quantitaSabbia').value = dati.cullsan;
                document.getElementById('spazioLibero').value = dati.spazioLibero;
                document.getElementById('inserti').value = dati.inserti;
            }
        }

        // Funzione per validare il form
        function validateForm() {
            console.log("validateForm chiamata");
            const required = ['dimensione', 'quantitaResina', 'quantitaSabbia', 'spazioLibero', 'inserti'];
            let isValid = true;

            required.forEach(field => {
                const value = document.getElementById(field).value;
                const error = document.getElementById(`${field}-error`);
                if (!value) {
                    error.textContent = 'Campo obbligatorio';
                    isValid = false;
                } else {
                    error.textContent = '';
                }
            });

            return isValid;
        }

        // Funzione per inviare i dati
        function inviaDati() {
            console.log("inviaDati chiamata");
            if (!validateForm()) {
                return;
            }

            const modello = document.getElementById('modello').value;
            const dimensione = document.getElementById('dimensione').value;
            
            const dati = {
                dimensione: dimensione,
                quantitaResina: parseFloat(document.getElementById('quantitaResina').value),
                quantitaSabbia: parseFloat(document.getElementById('quantitaSabbia').value),
                spazioLibero: parseFloat(document.getElementById('spazioLibero').value),
                inserti: document.getElementById('inserti').value,
                dataModifica: new Date().toISOString()
            };

            console.log("Salvataggio dati:", dati);

            db.collection("modelli")
                .doc(modello)
                .collection("configurazioni")
                .doc(dimensione)
                .set(dati)
                .then(() => {
                    console.log("Dati salvati con successo");
                    alert("Dati salvati con successo!");
                    caricaConfigurazioni(modello);
                })
                .catch((error) => {
                    console.error("Errore durante il salvataggio:", error);
                    alert("Errore durante il salvataggio: " + error.message);
                });
        }

        // Funzione per caricare le configurazioni
        function caricaConfigurazioni(modello) {
            console.log("caricaConfigurazioni chiamata per modello:", modello);
            const tbody = document.querySelector('#tabellaConfigurazioni tbody');
            tbody.innerHTML = '';

            db.collection("modelli")
                .doc(modello)
                .collection("configurazioni")
                .get()
                .then((querySnapshot) => {
                    querySnapshot.forEach((doc) => {
                        const data = doc.data();
                        const row = tbody.insertRow();
                        row.innerHTML = `
                            <td>${data.dimensione}</td>
                            <td>${data.quantitaResina}</td>
                            <td>${data.quantitaSabbia}</td>
                            <td>${data.spazioLibero}</td>
                            <td>${data.inserti}</td>
                            <td>
                                <button class="delete-btn" onclick="eliminaConfigurazione('${modello}', '${doc.id}')">
                                    Elimina
                                </button>
                            </td>
                        `;
                    });
                })
                .catch((error) => {
                    console.error("Errore nel caricamento delle configurazioni:", error);
                });
        }

        // Funzione per eliminare una configurazione
        function eliminaConfigurazione(modello, dimensione) {
            if (confirm("Sei sicuro di voler eliminare questa configurazione?")) {
                db.collection("modelli")
                    .doc(modello)
                    .collection("configurazioni")
                    .doc(dimensione)
                    .delete()
                    .then(() => {
                        alert("Configurazione eliminata con successo!");
                        caricaConfigurazioni(modello);
                    })
                    .catch((error) => {
                        alert("Errore durante l'eliminazione: " + error.message);
                        console.error("Errore durante l'eliminazione:", error);
                    });
            }
        }

        // Inizializza la visualizzazione
        showFields();
    </script>
</body>
</html>

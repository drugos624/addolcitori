<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurazione CTM</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }
        select, input {
            width: 100%;
            padding: 0.5rem;
            margin-bottom: 1rem;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 1rem;
        }
        button:hover {
            background-color: #45a049;
        }
        .error {
            color: red;
            font-size: 0.875rem;
            margin-top: -0.5rem;
            margin-bottom: 1rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 2rem;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        .delete-btn {
            background-color: #ff4444;
        }
        .delete-btn:hover {
            background-color: #cc0000;
        }
    </style>
</head>
<body>
    <h1>Configurazione CTM</h1>
    
    <form id="ctmForm">
        <div class="form-group">
            <label for="dimensione">Dimensione:</label>
            <select id="dimensione" required>
                <option value="">-- Seleziona --</option>
                <option value="60">60</option>
                <option value="90">90</option>
                <option value="120">120</option>
                <option value="150">150</option>
                <option value="210">210</option>
                <option value="300">300</option>
                <option value="450">450</option>
                <option value="600">600</option>
            </select>
            <div id="dimensione-error" class="error"></div>
        </div>

        <div class="form-group">
            <label for="quantitaResina">Quantità Resina (L):</label>
            <select id="quantitaResina" required>
                <option value="">-- Seleziona --</option>
                <option value="56">56</option>
                <option value="85">85</option>
                <option value="113">113</option>
                <option value="142">142</option>
                <option value="198">198</option>
                <option value="283">283</option>
                <option value="425">425</option>
                <option value="556">556</option>
            </select>
            <div id="resina-error" class="error"></div>
        </div>

        <div class="form-group">
            <label for="quantitaSottoLetto">Quantità Sotto-letto (Kg):</label>
            <select id="quantitaSottoLetto" required>
                <option value="">-- Seleziona --</option>
                <option value="14">14</option>
                <option value="18">18</option>
                <option value="23">23</option>
                <option value="32">32</option>
                <option value="59">59</option>
                <option value="136">136</option>
                <option value="181">181</option>
            </select>
            <div id="sottoletto-error" class="error"></div>
        </div>

        <div class="form-group">
            <label for="spazioLibero">Spazio Libero:</label>
            <select id="spazioLibero" required>
                <option value="">-- Seleziona --</option>
                <option value="482">482</option>
                <option value="723">723</option>
                <option value="762">762</option>
                <option value="711">711</option>
                <option value="863">863</option>
                <option value="782">782</option>
            </select>
            <div id="spazio-error" class="error"></div>
        </div>

        <div class="form-group">
            <label for="insertiFlow">Inserti Flow Control:</label>
            <select id="insertiFlow" required>
                <option value="">-- Seleziona --</option>
                <option value="0.4 nero-0.4 nero-2.5 nero">0.4 nero-0.4 nero-2.5 nero</option>
                <option value="plug-plug-blu">plug-plug-blu</option>
                <option value="plug-plug-rosso">plug-plug-rosso</option>
                <option value="plug-plug-verde">plug-plug-verde</option>
                <option value="plug-blu-blu">plug-blu-blu</option>
                <option value="plug-rosso-rosso">plug-rosso-rosso</option>
                <option value="blu-blu-arancione">blu-blu-arancione</option>
                <option value="arancione-arancione-arancione">arancione-arancione-arancione</option>
            </select>
            <div id="inserti-error" class="error"></div>
        </div>

        <div class="form-group">
            <label for="coloreUgello">Colore Ugello:</label>
            <select id="coloreUgello" required>
                <option value="">-- Seleziona --</option>
                <option value="nero">Nero</option>
                <option value="viola">Viola</option>
                <option value="rosso">Rosso</option>
                <option value="bianco">Bianco</option>
                <option value="blu">Blu</option>
                <option value="beige">Beige</option>
            </select>
            <div id="ugello-error" class="error"></div>
        </div>

        <div class="form-group">
            <label for="collo">Collo:</label>
            <select id="collo" required>
                <option value="">-- Seleziona --</option>
                <option value="blu n.3">Blu n.3</option>
                <option value="blu n.4">Blu n.4</option>
                <option value="blu n.5">Blu n.5</option>
                <option value="blu n.8">Blu n.8</option>
            </select>
            <div id="collo-error" class="error"></div>
        </div>

        <div class="form-group">
            <label for="capacitaScambio">Capacità Scambio:</label>
            <input type="number" id="capacitaScambio" required min="0" step="0.1">
            <div id="capacita-error" class="error"></div>
        </div>

        <button type="button" onclick="inviaDati()">Salva Configurazione</button>
    </form>

    <div id="tabellaContainer">
        <h2>Configurazioni Esistenti</h2>
        <table id="tabellaConfigurazioni">
            <thead>
                <tr>
                    <th>Dimensione</th>
                    <th>Resina (L)</th>
                    <th>Sotto-letto (Kg)</th>
                    <th>Spazio Libero</th>
                    <th>Inserti Flow</th>
                    <th>Colore Ugello</th>
                    <th>Collo</th>
                    <th>Capacità Scambio</th>
                    <th>Azioni</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAlu5Q1Ww3u2Dt_INeKOm5GSeEU-qFDtJs",
            authDomain: "addolcitori-2f8fe.firebaseapp.com",
            databaseURL: "https://addolcitori-2f8fe-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "addolcitori-2f8fe",
            storageBucket: "addolcitori-2f8fe.firebasestorage.app",
            messagingSenderId: "399702428879",
            appId: "1:399702428879:web:b9724499e30c49a3a8bbba"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function validateForm() {
            let isValid = true;
            document.querySelectorAll('.error').forEach(el => el.textContent = '');

            const fields = [
                'dimensione',
                'quantitaResina',
                'quantitaSottoLetto',
                'spazioLibero',
                'insertiFlow',
                'coloreUgello',
                'collo',
                'capacitaScambio'
            ];

            fields.forEach(field => {
                const element = document.getElementById(field);
                if (!element.value) {
                    document.getElementById(`${field.replace('Input', '')}-error`).textContent = 
                        'Questo campo è obbligatorio';
                    isValid = false;
                }
            });

            const capacita = document.getElementById('capacitaScambio').value;
            if (capacita <= 0) {
                document.getElementById('capacita-error').textContent = 
                    'La capacità deve essere maggiore di 0';
                isValid = false;
            }

            return isValid;
        }

        function caricaConfigurazioni() {
            const tbody = document.querySelector('#tabellaConfigurazioni tbody');
            tbody.innerHTML = '';

            db.collection("configurazioni_ctm")
                .get()
                .then((querySnapshot) => {
                    querySnapshot.forEach((doc) => {
                        const data = doc.data();
                        const row = tbody.insertRow();
                        row.innerHTML = `
                            <td>${data.dimensione}</td>
                            <td>${data.quantitaResina}</td>
                            <td>${data.quantitaSottoLetto}</td>
                            <td>${data.spazioLibero}</td>
                            <td>${data.insertiFlow}</td>
                            <td>${data.coloreUgello}</td>
                            <td>${data.collo}</td>
                            <td>${data.capacitaScambio}</td>
                            <td>
                                <button class="delete-btn" onclick="eliminaConfigurazione('${doc.id}')">
                                    Elimina
                                </button>
                            </td>
                        `;
                    });
                })
                .catch((error) => {
                    console.error("Errore nel caricamento delle configurazioni: ", error);
                });
        }

        function inviaDati() {
            if (!validateForm()) {
                return;
            }

            const dati = {
                dimensione: document.getElementById('dimensione').value,
                quantitaResina: document.getElementById('quantitaResina').value,
                quantitaSottoLetto: document.getElementById('quantitaSottoLetto').value,
                spazioLibero: document.getElementById('spazioLibero').value,
                insertiFlow: document.getElementById('insertiFlow').value,
                coloreUgello: document.getElementById('coloreUgello').value,
                collo: document.getElementById('collo').value,
                capacitaScambio: parseFloat(document.getElementById('capacitaScambio').value),
                dataModifica: new Date().toISOString()
            };

            db.collection("configurazioni_ctm")
                .add(dati)
                .then(() => {
                    alert("Configurazione salvata con successo!");
                    document.getElementById('ctmForm').reset();
                    caricaConfigurazioni();
                })
                .catch((error) => {
                    alert("Errore durante il salvataggio: " + error.message);
                    console.error("Errore durante il salvataggio: ", error);
                });
        }

        function eliminaConfigurazione(id) {
            if (confirm("Sei sicuro di voler eliminare questa configurazione?")) {
                db.collection("configurazioni_ctm")
                    .doc(id)
                    .delete()
                    .then(() => {
                        alert("Configurazione eliminata con successo!");
                        caricaConfigurazioni();
                    })
                    .catch((error) => {
                        alert("Errore durante l'eliminazione: " + error.message);
                        console.error("Errore durante l'eliminazione: ", error);
                    });
            }
        }

        // Load configurations on page load
        document.addEventListener('DOMContentLoaded', caricaConfigurazioni);
    </script>
</body>
</html>

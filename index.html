<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selezione Impianto</title>
    <style>
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <h1>Seleziona Impianto</h1>
    <label for="impianto">Modello:</label>
    <select id="impianto" onchange="showFieldsForSelectedImpianto()">
        <option value="">-- Seleziona --</option>
        <option value="he 1">HE 1</option>
        <option value="he 1,5">HE 1,5</option>
        <option value="ctm old">CTM Old</option>
        <option value="ctm 2.0">CTM 2.0</option>
        <option value="Ultra Line">Ultra Line</option>
        <option value="HiFlow">HiFlow</option>
    </select>

    <form id="impiantoForm">
        <div id="heFields" class="hidden">
            <h3>Campi per HE 1 e HE 1,5</h3>
            <label for="dimensione">Dimensione:</label>
            <input type="text" id="dimensione" name="dimensione" required><br>

            <label for="coloreUgello">Colore Ugello:</label>
            <input type="text" id="coloreUgello" name="coloreUgello" required><br>

            <label for="dimensioneCollo">Dimensione Collo:</label>
            <input type="text" id="dimensioneCollo" name="dimensioneCollo" required><br>

            <label for="quantitaResina">Quantità Resina:</label>
            <input type="number" id="quantitaResina" name="quantitaResina" required><br>

            <label for="quantitaSottoletto">Quantità Sottoletto:</label>
            <input type="number" id="quantitaSottoletto" name="quantitaSottoletto" required><br>

            <label for="spazioLibero">Spazio Libero:</label>
            <input type="number" id="spazioLibero" name="spazioLibero" required><br>
        </div>

        <div id="ctmFields" class="hidden">
            <h3>Campi per CTM Old e CTM 2.0</h3>
            <label for="dimensione">Dimensione:</label>
            <input type="text" id="dimensione" name="dimensione" required><br>

            <label for="coloreUgello">Colore Ugello:</label>
            <input type="text" id="coloreUgello" name="coloreUgello" required><br>

            <label for="quantitaResina">Quantità Resina:</label>
            <input type="number" id="quantitaResina" name="quantitaResina" required><br>

            <label for="quantitaSabbia">Quantità Sabbia:</label>
            <input type="number" id="quantitaSabbia" name="quantitaSabbia" required><br>

            <label for="spazioLibero">Spazio Libero:</label>
            <input type="number" id="spazioLibero" name="spazioLibero" required><br>
        </div>

        <button type="submit">Invia</button>
    </form>

    <script>
        function showFieldsForSelectedImpianto() {
            const impianto = document.getElementById('impianto').value;
            const heFields = document.getElementById('heFields');
            const ctmFields = document.getElementById('ctmFields');

            // Nascondi tutti i campi inizialmente
            heFields.classList.add('hidden');
            ctmFields.classList.add('hidden');

            // Rimuovi l'attributo required da tutti gli input
            document.querySelectorAll('#impiantoForm input').forEach(input => input.required = false);

            // Mostra i campi in base al modello selezionato e aggiungi required
            if (impianto === "he 1" || impianto === "he 1,5") {
                heFields.classList.remove('hidden');
                heFields.querySelectorAll('input').forEach(input => input.required = true);
            } else if (impianto === "ctm old" || impianto === "ctm 2.0") {
                ctmFields.classList.remove('hidden');
                ctmFields.querySelectorAll('input').forEach(input => input.required = true);
            }
        }
    </script>
</body>
</html>
